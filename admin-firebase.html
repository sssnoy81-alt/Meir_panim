<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לוח בקרה - מאיר פנים</title>
    <meta name="theme-color" content="#8B1538">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#f5f5f5; direction:rtl; }

        /* ===== LOGIN SCREEN ===== */
        #loginScreen {
            display:flex; align-items:center; justify-content:center;
            min-height:100vh;
            background:linear-gradient(135deg, #8B1538 0%, #E4032E 100%);
        }
        .login-box {
            background:white; padding:40px 32px; border-radius:20px;
            width:90%; max-width:360px; text-align:center;
        }
        .login-box .logo { font-size:48px; margin-bottom:8px; }
        .login-box h2 { color:#8B1538; font-size:24px; margin-bottom:4px; }
        .login-box p { color:#888; font-size:13px; margin-bottom:24px; }
        .inp-group { margin-bottom:14px; text-align:right; }
        .inp-group label { display:block; font-size:13px; color:#555; margin-bottom:5px; }
        .inp-group input {
            width:100%; padding:11px 13px; border:2px solid #e0e0e0;
            border-radius:9px; font-size:15px; font-family:inherit;
        }
        .inp-group input:focus { outline:none; border-color:#8B1538; }
        .login-btn {
            width:100%; padding:13px; background:#8B1538; color:white;
            border:none; border-radius:10px; font-size:16px; font-weight:700;
            cursor:pointer; font-family:inherit; margin-top:6px;
        }
        .login-btn:hover { background:#6d1028; }
        #loginErr { color:#dc3545; font-size:13px; min-height:18px; margin-bottom:8px; }
        .home-link { display:block; margin-top:16px; font-size:13px; color:#8B1538; text-decoration:none; }

        /* ===== MAIN APP ===== */
        #mainApp { display:none; padding:20px; max-width:1400px; margin:0 auto; }

        .header {
            background:linear-gradient(135deg, #8B1538 0%, #E4032E 100%);
            color:white; padding:22px 28px; border-radius:15px;
            margin-bottom:28px; box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }
        .header-top { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:10px; }
        .header h1 { font-size:26px; }
        .header-btns { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .back-btn {
            background:rgba(255,255,255,0.95); color:#8B1538; border:none;
            padding:9px 18px; border-radius:8px; cursor:pointer; font-weight:700;
            font-size:14px; font-family:inherit; text-decoration:none;
            display:inline-flex; align-items:center; gap:5px;
        }
        .back-btn:hover { background:white; }
        .logout-btn {
            background:rgba(255,255,255,0.15); color:white;
            border:2px solid rgba(255,255,255,0.7); padding:9px 18px;
            border-radius:8px; cursor:pointer; font-weight:600; font-family:inherit;
        }
        .logout-btn:hover { background:white; color:#8B1538; }
        .user-info {
            background:rgba(255,255,255,0.2); padding:7px 14px;
            border-radius:8px; font-size:13px; display:inline-block;
        }

        /* ===== STATS ===== */
        .stats-grid {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:18px; margin-bottom:26px;
        }
        .stat-card {
            background:white; padding:22px; border-radius:14px;
            box-shadow:0 3px 15px rgba(0,0,0,0.08); text-align:center;
        }
        .stat-icon { font-size:36px; margin-bottom:8px; }
        .stat-number { font-size:44px; font-weight:bold; color:#8B1538; margin:8px 0; }
        .stat-label { font-size:14px; color:#666; font-weight:600; }
        .progress-bar-wrap { background:#e0e0e0; height:26px; border-radius:13px; overflow:hidden; margin-top:8px; }
        .progress-bar { height:100%; background:linear-gradient(90deg,#28a745,#20c997); transition:width 0.5s; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:13px; }

        /* ===== PANELS ===== */
        .panel {
            background:white; padding:26px; border-radius:14px;
            box-shadow:0 3px 15px rgba(0,0,0,0.08); margin-bottom:26px;
        }
        .panel h2 { color:#8B1538; margin-bottom:18px; font-size:20px; }

        /* Branch stats table */
        .branch-row {
            display:grid; grid-template-columns:2fr 1fr 1fr 1fr 2fr;
            padding:11px 14px; border-bottom:1px solid #eee; align-items:center; font-size:14px;
        }
        .branch-row.header-row { background:#f8f9fa; font-weight:700; border-radius:8px; }
        .branch-row:hover:not(.header-row) { background:#f8f9fa; }

        /* Package type cards */
        .pkg-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; }
        .pkg-card { border:2px solid #e5e7eb; border-radius:12px; padding:16px; text-align:center; position:relative; overflow:hidden; }
        .pkg-card::before { content:""; position:absolute; top:0; left:0; right:0; height:4px; }
        .pkg-card.food::before  { background:#8B1538; }
        .pkg-card.voucher::before { background:#2563eb; }
        .pkg-card.both::before  { background:#16a34a; }
        .pkg-name { font-size:14px; font-weight:700; color:#333; margin-bottom:10px; }
        .pkg-nums { display:flex; justify-content:space-around; margin-bottom:10px; }
        .pkg-num { font-size:24px; font-weight:800; color:#8B1538; }
        .pkg-num.green { color:#16a34a; }
        .pkg-num.gray  { color:#6b7280; }
        .pkg-num-lbl { font-size:11px; color:#888; margin-top:2px; }
        .pkg-progress { background:#e0e0e0; height:14px; border-radius:7px; overflow:hidden; }
        .pkg-progress-bar { height:100%; background:linear-gradient(90deg,#8B1538,#E4032E); }

        /* Registration list */
        .search-box {
            width:100%; padding:11px; border:2px solid #e0e0e0;
            border-radius:8px; font-size:15px; margin-bottom:16px; font-family:inherit;
        }
        .search-box:focus { outline:none; border-color:#8B1538; }
        .reg-item {
            padding:13px; border-right:4px solid #8B1538;
            background:#f8f9fa; margin-bottom:9px; border-radius:8px;
            display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:12px; align-items:center;
        }
        .reg-item.delivered { border-right-color:#28a745; opacity:0.75; }
        .reg-info { font-size:13px; }
        .reg-info strong { color:#333; }
        .delete-btn {
            background:#dc3545; color:white; border:none; padding:7px 13px;
            border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; font-family:inherit;
        }
        .delete-btn:hover { background:#c82333; }
        .export-btn {
            background:#28a745; color:white; border:none; padding:9px 18px;
            border-radius:8px; cursor:pointer; font-weight:600; font-family:inherit; font-size:14px;
        }
        .loading { text-align:center; padding:36px; color:#888; font-size:15px; }

        @media(max-width:768px) {
            #mainApp { padding:10px; }
            .header h1 { font-size:20px; }
            .stats-grid { grid-template-columns:1fr 1fr; }
            .stat-number { font-size:34px; }
            .branch-row { grid-template-columns:1fr 1fr; gap:4px; font-size:12px; }
            .reg-item { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen">
    <div class="login-box">
        <div class="logo">❤️</div>
        <h2>מאיר פנים</h2>
        <p>כניסה ללוח בקרה</p>
        <div class="inp-group">
            <label>שם משתמש</label>
            <input type="text" id="loginUser" placeholder="שם משתמש" autocomplete="username">
        </div>
        <div class="inp-group">
            <label>סיסמה</label>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div id="loginErr"></div>
        <button class="login-btn" onclick="doLogin()">כניסה</button>
        <a href="home.html" class="home-link">← דף הבית</a>
    </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="mainApp">
    <div class="header">
        <div class="header-top">
            <h1>📊 לוח בקרה</h1>
            <div class="header-btns">
                <a href="volunteer-firebase.html" class="back-btn">🤝 מנהל סניף</a>
                <button class="logout-btn" onclick="doLogout()">🚪 התנתק</button>
            </div>
        </div>
        <div class="user-info">
            <strong id="userName"></strong>
            <span id="userBranch" style="margin-right:10px;opacity:0.85;"></span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-number" id="totalFamilies">0</div>
            <div class="stat-label">סה"כ משפחות רשומות</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">✅</div>
            <div class="stat-number" id="deliveredCount">0</div>
            <div class="stat-label">חבילות שנמסרו</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div class="stat-number" id="pendingCount">0</div>
            <div class="stat-label">ממתין למסירה</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-number" id="rateDisplay">0%</div>
            <div class="stat-label">אחוז השלמה</div>
            <div class="progress-bar-wrap">
                <div id="progressBar" class="progress-bar" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- Branch stats - only for admin-main and super-admin -->
    <div class="panel" id="branchPanel" style="display:none;">
        <h2>📍 סטטיסטיקות לפי סניף</h2>
        <div id="branchStats"><div class="loading">טוען...</div></div>
    </div>

    <!-- Package type breakdown -->
    <div class="panel">
        <h2>📦 פילוח לפי סוג חבילה</h2>
        <div id="packageStats"><div class="loading">טוען...</div></div>
    </div>

    <!-- Recent registrations -->
    <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
            <h2 style="margin:0;">📋 רישומים אחרונים</h2>
            <button class="export-btn" onclick="exportExcel()">📊 ייצא לאקסל</button>
        </div>
        <input type="text" id="searchBox" class="search-box"
               placeholder="🔍 חיפוש לפי שם, מספר הזמנה או ת.ז"
               oninput="filterList()">
        <div id="regList"><div class="loading">טוען...</div></div>
    </div>
</div>

<script type="module">
import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, deleteDoc, query, where }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ===== CONFIG =====
const PASS = 'MeirPanim2025';
const USERS = {
    'super-admin':       { level:3, name:'מנהל על',            branch:null },
    'admin-main':        { level:2, name:'אדמין ראשי',          branch:null },
    'manager-jerusalem': { level:1, name:'מנהל סניף ירושלים',   branch:'ירושלים' },
    'manager-tzfat':     { level:1, name:'מנהל סניף צפת',       branch:'צפת' },
    'manager-dimona':    { level:1, name:'מנהל סניף דימונה',    branch:'דימונה' },
    'manager-orakiva':   { level:1, name:'מנהל סניף אור עקיבא', branch:'אור עקיבא' },
    'manager-tiberias':  { level:1, name:'מנהל סניף טבריה',     branch:'טבריה' }
};
const BRANCHES = ['ירושלים','צפת','דימונה','אור עקיבא','טבריה'];

const firebaseConfig = {
    apiKey: "AIzaSyAmaAzUatTV97LwL4VoVEUrJoVpnF612ig",
    authDomain: "meir-panim-f27c4.firebaseapp.com",
    projectId: "meir-panim-f27c4",
    storageBucket: "meir-panim-f27c4.firebasestorage.app",
    messagingSenderId: "252083260218",
    appId: "1:252083260218:web:ea5e1e072aed819b8d1e03"
};

const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
const db  = getFirestore(app);

let session = null;       // { username, level, name, branch }
let allRegs = [];         // all loaded registrations

// ===== AUTH =====
// Try to restore session from sessionStorage (set by volunteer-firebase via goToDashboard)
function tryRestoreSession() {
    const raw  = sessionStorage.getItem('meirPanimAuth');
    const time = sessionStorage.getItem('meirPanimAuthTime');
    if (!raw || !time) return false;
    if (Date.now() - parseInt(time) > 24 * 60 * 60 * 1000) {
        sessionStorage.removeItem('meirPanimAuth');
        sessionStorage.removeItem('meirPanimAuthTime');
        return false;
    }
    const data = JSON.parse(raw);
    // Build session in our format from stored data
    session = {
        username: data.username || '',
        level:    data.level,
        name:     data.hebrewName || data.name || '',
        branch:   data.branch || null
    };
    return true;
}

function startApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userName').textContent = session.name;
    document.getElementById('userBranch').textContent =
        session.branch ? 'סניף: ' + session.branch :
        session.level >= 3 ? 'Super Admin' : 'Admin ראשי';
    // Show branch panel only for level >= 2 (sees all branches)
    if (session.level >= 2) {
        document.getElementById('branchPanel').style.display = 'block';
    }
    loadData();
}

// Try restore on page load
if (tryRestoreSession()) {
    startApp();
}

// ===== LOGIN =====
window.doLogin = function() {
    const u = document.getElementById('loginUser').value.trim().toLowerCase();
    const p = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    errEl.textContent = '';

    const user = USERS[u];
    if (!user || p !== PASS) {
        errEl.textContent = 'שם משתמש או סיסמה שגויים';
        return;
    }

    session = { username: u, level: user.level, name: user.name, branch: user.branch };
    // Save to sessionStorage so volunteer-firebase can read it too
    sessionStorage.setItem('meirPanimAuth', JSON.stringify({
        username:    u,
        hebrewName:  user.name,
        level:       user.level,
        branch:      user.branch,
        permissions: { viewAll: user.level >= 2, delete: user.level >= 2 }
    }));
    sessionStorage.setItem('meirPanimAuthTime', Date.now().toString());
    startApp();
};

document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
});

window.doLogout = function() {
    session = null;
    sessionStorage.removeItem('meirPanimAuth');
    sessionStorage.removeItem('meirPanimAuthTime');
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginErr').textContent = '';
};

// ===== LOAD DATA =====
async function loadData() {
    try {
        let snap;
        if (session.level >= 2) {
            // admin-main and super-admin see ALL registrations
            snap = await getDocs(collection(db, 'registrations'));
        } else {
            // branch manager sees only their branch
            snap = await getDocs(query(
                collection(db, 'registrations'),
                where('city', '==', session.branch)
            ));
        }
        allRegs = [];
        snap.forEach(d => allRegs.push({ id: d.id, ...d.data() }));
        renderAll();
    } catch(e) {
        console.error('Load error:', e);
        document.getElementById('regList').innerHTML =
            `<div style="color:red;padding:20px;">שגיאה בטעינה: ${e.message}</div>`;
    }
}

// ===== RENDER =====
function renderAll() {
    // For branch managers, filter display to their branch only
    const regs = session.level >= 2 ? allRegs :
        allRegs.filter(r => r.city === session.branch);

    // Top stats
    const total     = regs.length;
    const delivered = regs.filter(r => r.packageReceived).length;
    const pending   = total - delivered;
    const rate      = total > 0 ? Math.round((delivered / total) * 100) : 0;

    document.getElementById('totalFamilies').textContent = total;
    document.getElementById('deliveredCount').textContent = delivered;
    document.getElementById('pendingCount').textContent   = pending;
    document.getElementById('rateDisplay').textContent    = rate + '%';
    const pb = document.getElementById('progressBar');
    pb.style.width  = rate + '%';
    pb.textContent  = rate > 10 ? rate + '%' : '';

    // Branch breakdown (only for level >= 2)
    if (session.level >= 2) {
        renderBranchStats(allRegs);
    }

    // Package type breakdown
    renderPackageStats(regs);

    // Registration list
    renderRegList(regs);
}

function renderBranchStats(regs) {
    const rows = BRANCHES.map(city => {
        const cr  = regs.filter(r => r.city === city);
        const tot = cr.length;
        const del = cr.filter(r => r.packageReceived).length;
        const rt  = tot > 0 ? Math.round((del / tot) * 100) : 0;
        return `<div class="branch-row">
            <div>${city}</div>
            <div>${tot}</div>
            <div>${del}</div>
            <div>${tot - del}</div>
            <div>
                <div class="progress-bar-wrap" style="height:18px;">
                    <div class="progress-bar" style="width:${rt}%;font-size:11px;">${rt}%</div>
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('branchStats').innerHTML =
        `<div class="branch-row header-row">
            <div>סניף</div><div>סה"כ</div><div>נמסר</div><div>ממתין</div><div>השלמה</div>
         </div>` + rows;
}

function renderPackageStats(regs) {
    const types = [
        { key:'חבילת מזון',   label:'חבילת מזון',   cls:'food',    icon:'📦' },
        { key:'תלוש/שובר',    label:'תלוש / שובר',  cls:'voucher', icon:'🎫' },
        { key:'חבילה + שובר', label:'חבילה + שובר', cls:'both',    icon:'🎁' }
    ];
    document.getElementById('packageStats').innerHTML =
        `<div class="pkg-grid">` +
        types.map(t => {
            const pr  = regs.filter(r => r.packageType === t.key);
            const tot = pr.length;
            const del = pr.filter(r => r.packageReceived).length;
            const rt  = tot > 0 ? Math.round((del / tot) * 100) : 0;
            return `<div class="pkg-card ${t.cls}">
                <div class="pkg-name">${t.icon} ${t.label}</div>
                <div class="pkg-nums">
                    <div class="pkg-num-item"><div class="pkg-num">${tot}</div><div class="pkg-num-lbl">סה"כ</div></div>
                    <div class="pkg-num-item"><div class="pkg-num green">${del}</div><div class="pkg-num-lbl">נמסרו</div></div>
                    <div class="pkg-num-item"><div class="pkg-num gray">${tot-del}</div><div class="pkg-num-lbl">ממתינים</div></div>
                </div>
                <div class="pkg-progress"><div class="pkg-progress-bar" style="width:${rt}%"></div></div>
                <div style="font-size:11px;color:#888;margin-top:5px;">${rt}% הושלם</div>
            </div>`;
        }).join('') + `</div>`;
}

function renderRegList(regs) {
    const sorted = [...regs].sort((a, b) => {
        const da = a.registrationDate?.toDate?.() || new Date(0);
        const db2 = b.registrationDate?.toDate?.() || new Date(0);
        return db2 - da;
    });
    if (!sorted.length) {
        document.getElementById('regList').innerHTML = '<div class="loading">אין רישומים</div>';
        return;
    }
    // Can delete if level >= 2 (admin-main and super-admin)
    const canDelete = session.level >= 2;
    document.getElementById('regList').innerHTML = sorted.map(r => `
        <div class="reg-item ${r.packageReceived ? 'delivered' : ''}">
            <div class="reg-info">
                <strong>${r.registrationNumber || ''}</strong><br>${r.fullName || ''}
            </div>
            <div class="reg-info">
                <strong>עיר:</strong> ${r.city || ''}<br>
                <strong>סוג:</strong> ${r.packageType || ''}
            </div>
            <div class="reg-info">
                <strong>סטטוס:</strong><br>
                ${r.packageReceived ? '✅ נמסר' : '⏳ ממתין'}
            </div>
            <div>
                ${canDelete
                    ? `<button class="delete-btn" data-id="${r.id}" data-name="${(r.fullName||'').replace(/"/g,'')}" onclick="deleteReg(this)">🗑️ מחק</button>`
                    : ''}
            </div>
        </div>`).join('');
}

// ===== SEARCH =====
window.filterList = function() {
    const term = document.getElementById('searchBox').value.trim().toLowerCase();
    const regs = session.level >= 2 ? allRegs : allRegs.filter(r => r.city === session.branch);
    if (!term) { renderRegList(regs); return; }
    renderRegList(regs.filter(r =>
        (r.registrationNumber||'').toLowerCase().includes(term) ||
        (r.fullName||'').toLowerCase().includes(term) ||
        (r.idNumber||'').includes(term)
    ));
};

// ===== DELETE =====
window.deleteReg = async function(btn) {
    if (session.level < 2) { alert('אין הרשאה למחוק'); return; }
    const docId = btn.dataset.id;
    const name  = btn.dataset.name || 'רשומה זו';
    if (!confirm(`למחוק את הרישום של ${name}?\n\nפעולה זו אינה ניתנת לביטול!`)) return;
    btn.disabled = true;
    btn.textContent = '...';
    try {
        await deleteDoc(doc(db, 'registrations', docId));
        btn.closest('.reg-item').remove();
        allRegs = allRegs.filter(r => r.id !== docId);
        renderAll(); // refresh stats
    } catch(e) {
        alert('שגיאה במחיקה: ' + e.message);
        btn.disabled = false;
        btn.textContent = '🗑️ מחק';
    }
};

// ===== EXPORT =====
window.exportExcel = function() {
    const regs = session.level >= 2 ? allRegs : allRegs.filter(r => r.city === session.branch);
    if (!regs.length) { alert('אין נתונים לייצוא'); return; }

    const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const headers = ['מספר הזמנה','שם','ת.ז','טלפון','עיר','סוג חבילה','סטטוס','הערות'];
    const headerRow = headers.map(h => `<th>${esc(h)}</th>`).join('');
    const dataRows  = regs.map(r =>
        '<tr>' + [
            r.registrationNumber||'', r.fullName||'', r.idNumber||'',
            r.phone||'', r.city||'', r.packageType||'',
            r.packageReceived ? 'נמסר' : 'ממתין', r.notes||''
        ].map(c => `<td>${esc(c)}</td>`).join('') + '</tr>'
    ).join('');

    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
        xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8">
<!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
<x:Name>דוח</x:Name><x:WorksheetOptions><x:DisplayRightToLeft/></x:WorksheetOptions>
</x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
<style>body{direction:rtl}table{border-collapse:collapse;direction:rtl}
th{background:#8B1538;color:white;padding:8px 12px;border:1px solid #ccc}
td{padding:7px 12px;border:1px solid #ddd}tr:nth-child(even) td{background:#f9f9f9}</style>
</head><body dir="rtl"><table dir="rtl">
<thead><tr>${headerRow}</tr></thead><tbody>${dataRows}</tbody></table></body></html>`;

    const blob = new Blob([html], { type:'application/vnd.ms-excel;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `דוח_${session.branch||'כל_הסניפים'}_${new Date().toISOString().split('T')[0]}.xls`;
    a.click();
};

// Auto-refresh every 30 seconds
setInterval(loadData, 30000);
</script>
